<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة الأوفياء الرقمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.org/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* (نفس التنسيقات السابقة تماماً) */
        :root { --primary-gold: #e5a93b; --dark-gold: #b88219; --card-bg: linear-gradient(135deg, #1e272e 0%, #0f141a 100%); }
        body { font-family: sans-serif; background: #0b0f14; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card-container { width: 100%; max-width: 340px; height: 200px; perspective: 1000px; cursor: pointer; margin-bottom: 25px; }
        .loyalty-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; border-radius: 16px; border: 1px solid rgba(229, 169, 59, 0.25); }
        .loyalty-card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; padding: 20px; box-sizing: border-box; background: var(--card-bg); display: flex; flex-direction: column; justify-content: space-between; }
        .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; background: #11171d; }
        .points-value { font-size: 48px; font-weight: 900; color: white; margin-top: 5px; }
        .hint-text { font-size: 13px; color: var(--primary-gold); padding: 8px 16px; border-radius: 30px; border: 1px dashed rgba(229, 169, 59, 0.3); }
        #qrcode { background: white; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card-container" onclick="toggleCard()">
        <div class="loyalty-card" id="card">
            <div class="card-face card-front">
                <div><span style="color:var(--primary-gold); font-weight:bold;">CAMPUS YUMMY</span></div>
                <div>
                    <div style="font-size: 12px; color: #8a97a5;">رصيد النقاط الحالي</div>
                    <div class="points-value" id="points-display">0</div>
                </div>
            </div>
            <div class="card-face card-back">
                <div id="qrcode"></div>
            </div>
        </div>
    </div>

    <div class="hint-text" onclick="toggleCard()">🔄 اضغط على الكرت لقلبه وإظهار كود الـ QR</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // دالة التحديث الأساسية
        function updatePoints() {
            const urlParams = new URLSearchParams(window.location.search);
            const points = urlParams.get('points');
            if (points !== null) {
                document.getElementById('points-display').innerText = points;
            }
        }

        // التحديث عند تحميل الصفحة لأول مرة
        updatePoints();

        // الأهم: التحديث عند ظهور الصفحة (لحل مشكلة الكاش)
        window.addEventListener('pageshow', function(event) {
            updatePoints();
        });

        // توليد الـ QR كود مرة واحدة
        const userId = new URLSearchParams(window.location.search).get('user_id') || "000";
        new QRCode(document.getElementById("qrcode"), { text: userId, width: 120, height: 120 });

        function toggleCard() { document.getElementById('card').classList.toggle('flipped'); }
    </script>
</body>
</html>
