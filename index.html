<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظة الأوفياء الرقمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-gold: #e5a93b;
            --dark-gold: #b88219;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .loyalty-card {
            width: 100%;
            max-width: 360px;
            height: 210px;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(229, 169, 59, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-gold);
        }

        .card-badge {
            font-size: 11px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--dark-gold) 100%);
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: bold;
        }

        .points-display {
            margin: 15px 0;
        }

        .points-label {
            font-size: 11px;
            color: #adb5bd;
        }

        .points-count {
            font-size: 42px;
            font-weight: 800;
            color: white;
        }

        .member-name {
            font-size: 15px;
            font-weight: 600;
            color: #f8f9fa;
        }

        /* 📌 قسم عرض كود الـ QR الخاص بالزبون */
        .qr-container {
            margin-top: 30px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .info-text {
            font-size: 13px;
            color: #6c757d;
            text-align: center;
            margin-top: 15px;
            line-height: 1.5;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="loyalty-card">
        <div class="card-header">
            <div class="logo-area">🍔 CAMPUS YUMMY 😋</div>
            <div class="card-badge">VIP CARD</div>
        </div>
        <div class="points-display">
            <div class="points-label">رصيد النقاط الحالي</div>
            <div class="points-count" id="points-val">...</div>
        </div>
        <div class="card-footer">
            <div class="member-name" id="user-fullname">جاري التحميل..</div>
        </div>
    </div>

    <div class="qr-container">
        <div id="qrcode"></div>
    </div>

    <div class="info-text">
        قم بإظهار كود الـ QR هذا للكاشير عند الدفع ليقوم بمسحه وشحن نقاطك فوراً ⚡
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const telegramUser = tg.initDataUnsafe.user;
        let userId = "unknown";
        
        if (telegramUser) {
            userId = telegramUser.id.toString();
            const fullName = telegramUser.first_name + " " + (telegramUser.last_name || "");
            document.getElementById('user-fullname').innerText = fullName;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const currentPoints = urlParams.get('points') || '0';
        document.getElementById('points-val').innerText = currentPoints;

        // توليد كود الـ QR الثابت الذي يحتوي على معرف الزبون (User ID)
        new QRCode(document.getElementById("qrcode"), {
            text: userId,
            width: 160,
            height: 160,
            colorDark : "#1a1a1a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
