<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUMMY 😋 - بطاقة الأوفياء</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --gold: #f3c623;
            --gold-dark: #b8860b;
            --brown: #5c2c06;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, #1c1502 0%, var(--bg-color) 70%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1️⃣ منطقة الهيدر */
        .card-header { 
            text-align: center; 
            margin-bottom: 25px; 
            position: relative;
        }
        .brand-logo { 
            font-size: 65px; 
            margin-bottom: 5px;
            filter: drop-shadow(0 0 10px rgba(243, 198, 35, 0.3));
            animation: pulse 2s infinite;
        }
        h1 { 
            color: var(--gold); 
            margin: 0; 
            font-size: 2.2em;
            letter-spacing: 3px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .brand-subtitle { 
            color: #b3b3b3; 
            margin: 5px 0 0 0; 
            font-size: 0.95em; 
        }

        /* 2️⃣ بطاقة الرصيد البارزة */
        .points-card {
            background: linear-gradient(135deg, var(--brown), #2b1402);
            width: 100%;
            max-width: 360px;
            padding: 25px 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            border: 1.5px solid var(--gold);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        .points-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(243,198,35,0.1) 0%, transparent 60%);
        }
        .points-value { 
            font-size: 2.8em; 
            font-weight: 900; 
            color: #ffffff; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .points-value span { font-size: 0.5em; color: var(--gold); }
        
        /* شريط التقدم الذهبي */
        .progress-container { 
            background: rgba(0, 0, 0, 0.4); 
            height: 14px; 
            border-radius: 10px; 
            margin: 20px 0 10px 0; 
            overflow: hidden; 
            border: 1px solid rgba(243, 198, 35, 0.2);
        }
        .progress-bar { 
            background: linear-gradient(90deg, var(--gold-dark), var(--gold)); 
            height: 100%; 
            width: 0%; 
            border-radius: 10px; 
            transition: width 1s ease-in-out;
            box-shadow: 0 0 10px var(--gold);
        }
        .status-text { color: #e0e0e0; font-size: 0.9em; margin: 5px 0 0 0; }

        /* 3️⃣ قائمة المأكولات والمكافآت */
        .rewards-section {
            width: 100%;
            max-width: 360px;
            margin-top: 30px;
        }
        .rewards-title {
            font-size: 1.1em;
            color: var(--gold);
            margin-bottom: 15px;
            padding-right: 5px;
            border-right: 3px solid var(--gold);
        }
        .rewards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .reward-item {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            border: 1px solid #2a2a2a;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .reward-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .reward-name { font-size: 0.95em; font-weight: bold; margin: 5px 0; }
        .reward-cost { font-size: 0.85em; color: var(--gold); font-weight: bold; }

        /* 4️⃣ منطقة كود الـ QR */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 35px 0;
            text-align: center;
        }
        #qrcode { 
            background: white; 
            padding: 12px; 
            border-radius: 20px; 
            box-shadow: 0 0 25px rgba(243, 198, 35, 0.2);
            border: 2px solid var(--gold);
        }
        .qr-instruction {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 12px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- 1️⃣ الهيدر -->
    <div class="card-header">
        <div class="brand-logo">😋</div>
        <h1>YUMMY</h1>
        <p class="brand-subtitle">بطاقة الأوفياء الرقمية لمحل CAMPUS</p>
    </div>

    <!-- 2️⃣ بطاقة الرصيد وشريط التقدم -->
    <div class="points-card">
        <div class="points-value" id="points-display">0 <span>نقطة</span> 🏅</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="status-text" id="status-text">جاري تحميل رصيدك...</p>
    </div>

    <!-- 3️⃣ كود الـ QR للمسح عند الكاشير -->
    <div class="qr-section">
        <div id="qrcode"></div>
        <p class="qr-instruction">أظهر هذا الكود للكاشير لشحن أو استبدال نقاطك ✨</p>
    </div>

    <!-- 4️⃣ معرض الأكلات والمكافآت المتاحة للتبديل -->
    <div class="rewards-section">
        <div class="rewards-title">المكافآت المتاحة للاستبدال</div>
        <div class="rewards-grid">
            
            <div class="reward-item">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" alt="برجر" class="reward-img">
                <div class="reward-name">🍔 برجر كلاسيك</div>
                <div class="reward-cost">500 نقطة</div>
            </div>

            <div class="reward-item">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="بيتزا" class="reward-img">
                <div class="reward-name">🍕 بيتزا مارغريتا</div>
                <div class="reward-cost">700 نقطة</div>
            </div>

            <div class="reward-item">
                <img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=400" alt="بطاطا" class="reward-img">
                <div class="reward-name">🍟 بطاطا مقلية</div>
                <div class="reward-cost">200 نقطة</div>
            </div>

            <div class="reward-item">
                <img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=400" alt="مشروب" class="reward-img">
                <div class="reward-name">🥤 مشروب بارد غازي</div>
                <div class="reward-cost">150 نقطة</div>
            </div>

        </div>
    </div>

    <script>
        // تهيئة واجهة تليجرام البيئية وتوسيعها بالكامل
        const tg = window.Telegram.WebApp;
        tg.expand();

        // التقاط معطيات المستخدم الحية القادمة من البوت عبر الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id') || "123456789"; // افتراضي للاختبار
        const points = parseInt(urlParams.get('points')) || 0;

        // 1. عرض النقاط الحالية للزبون
        document.getElementById('points-display').innerHTML = `${points} <span>نقطة</span> 🏅`;
        
        // 2. تحديث حركة شريط التقدم ونصوص التنبيه (على فرض أن الوجبة الكبيرة بـ 500 نقطة)
        const targetPoints = 500;
        const progressPercentage = Math.min((points / targetPoints) * 100, 100);
        
        // تشغيل التحريك بعد تحميل الصفحة بقليل ليعطي تأثيراً جميلاً
        setTimeout(() => {
            document.getElementById('progress-bar').style.width = `${progressPercentage}%`;
        }, 300);

        // تخصيص رسالة تفاعلية حسب رصيد النقاط الحالي للزبون
        const statusTextElement = document.getElementById('status-text');
        if (points >= targetPoints) {
            statusTextElement.innerText = "🎉 مبروك! لديك نقاط كافية لطلب وجبة مجانية الآن!";
            statusTextElement.style.color = "#2ecc71";
        } else {
            const remaining = targetPoints - points;
            statusTextElement.innerText = `باقي لك ${remaining} نقطة للحصول على برجر مجاني!`;
        }

        // 3. توليد كود الـ QR الديناميكي بشكل فوري
        new QRCode(document.getElementById("qrcode"), {
            text: userId,
            width: 140,
            height: 140,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
