<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUMMY 😋 - بطاقة الأوفياء</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --gold: #f3c623;
            --gold-light: #fff3b0;
            --brown-gradient: linear-gradient(180deg, #a65319 0%, #73340f 100%);
            --card-bg: #141414;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            /* تأثير الخلفية المتموجة الداكنة والمضيئة من الأعلى */
            background-image: 
                radial-gradient(circle at top, #261c04 0%, #0d0d0d 60%),
                linear-gradient(0deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.5) 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 1️⃣ الهيدر الفخم (الجزء العلوي) */
        .card-header { 
            text-align: center; 
            margin-top: 20px;
            margin-bottom: 20px; 
            width: 100%;
        }
        
        /* دائرة الإيموجي الذهبية المضيئة */
        .logo-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            background: transparent;
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px rgba(243, 198, 35, 0.6), inset 0 0 15px rgba(243, 198, 35, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .brand-logo { 
            font-size: 60px; 
            line-height: 1;
        }
        
        h1 { 
            color: #ffffff; 
            margin: 0; 
            font-size: 2.2em;
            font-weight: 800;
            letter-spacing: 2px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .brand-subtitle { 
            color: #d4af37; 
            margin: 3px 0; 
            font-size: 1.1em; 
            font-weight: 600;
        }
        .brand-sub-campus {
            color: #b3b3b3;
            margin: 0;
            font-size: 0.9em;
        }

        /* 2️⃣ منطقة بطاقة النقاط العائمة مدمجة مع الـ QR في الخلفية */
        .card-container-wrapper {
            position: relative;
            width: 100%;
            max-width: 360px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* حاوية كود الـ QR خلف مربع النقاط */
        .qr-background {
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            margin-bottom: -15px; /* تجعله يختبئ جزئياً خلف المربع البني */
            z-index: 1;
            transform: scale(0.85);
            opacity: 0.8;
            transition: all 0.3s ease;
        }
        
        /* بطاقة النقاط العائمة (نفس لون وحجم الصورة بالضبط) */
        .points-card {
            background: var(--brown-gradient);
            width: 100%;
            padding: 20px 15px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-sizing: border-box;
            z-index: 2; /* لتكون فوق الـ QR */
            position: relative;
        }
        
        .points-value { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: #ffffff; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0;
        }
        .points-value span { font-size: 0.75em; font-weight: normal; }
        .points-value .medal { font-size: 0.9em; }
        
        /* شريط التقدم الفاخر */
        .progress-container { 
            background: rgba(0, 0, 0, 0.3); 
            height: 16px; 
            border-radius: 20px; 
            margin: 15px 0 10px 0; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .progress-bar { 
            background: linear-gradient(90deg, #e6b800, var(--gold)); 
            height: 100%; 
            width: 0%; 
            border-radius: 20px; 
            transition: width 1s ease-in-out;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.2);
        }
        .progress-percentage {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75em;
            color: #ffffff;
            font-weight: bold;
        }
        .status-text { 
            color: #fff3b0; 
            font-size: 0.9em; 
            margin: 5px 0 0 0; 
            font-weight: 500;
        }

        /* 3️⃣ شبكة استعراض المأكولات والمكافآت */
        .rewards-section {
            width: 100%;
            max-width: 360px;
        }
        .rewards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .reward-item {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 8px;
            text-align: center;
            border: 1px solid #222;
        }
        .reward-img {
            width: 100%;
            height: 95px;
            object-fit: cover;
            border-radius: 10px;
        }
        .reward-name { font-size: 0.9em; font-weight: bold; margin: 4px 0 2px 0; color: #fff; }
        .reward-cost { 
            font-size: 0.85em; 
            color: #ffffff; 
            background: rgba(243, 198, 35, 0.15);
            border: 1px solid rgba(243, 198, 35, 0.3);
            border-radius: 20px;
            padding: 2px 8px;
            display: inline-block;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="card-header">
        <div class="logo-container">
            <div class="brand-logo">😋</div>
        </div>
        <h1>YUMMY</h1>
        <p class="brand-subtitle">بطاقة الأوفياء الرقمية</p>
        <p class="brand-sub-campus">لمحل CAMPUS</p>
    </div>

    <div class="card-container-wrapper">
        
        <div class="qr-background">
            <div id="qrcode"></div>
        </div>
        
        <div class="points-card">
            <div class="points-value" id="points-display">
                <span id="points-num">450</span> <span>نقطة</span> <span class="medal">🏅</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <div class="progress-percentage" id="progress-percent">0%</div>
            </div>
            <p class="status-text" id="status-text">جاري الحساب...</p>
        </div>
    </div>

    <div class="rewards-section">
        <div class="rewards-grid" id="rewards-grid-container">
            </div>
    </div>

    <script>
        // إعدادات التحكم بالأسعار القادمة ديناميكياً من البوت
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id') || "123456789"; 
        const points = parseInt(urlParams.get('points')) || 0;

        // استقبال الأسعار الحية القادمة من البوت
        const burgerCost = parseInt(urlParams.get('b_cost')) || 500;
        const pizzaCost  = parseInt(urlParams.get('p_cost')) || 700;
        const friesCost  = parseInt(urlParams.get('f_cost')) || 200;
        const sodaCost   = parseInt(urlParams.get('s_cost')) || 150;

        const REWARDS_CONFIG = {
            burger: { name: "برجر كلاسيك", cost: burgerCost, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" },
            pizza:  { name: "بيتزا مارغريتا", cost: pizzaCost, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" },
            fries:  { name: "بطاطا مقلية", cost: friesCost, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=400" },
            soda:   { name: "مشروب غازي", cost: sodaCost, img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=400" }
        };

        // تحديث قيمة النقاط في المربع البني
        document.getElementById('points-num').innerText = points;
        
        // حساب نسبة شريط التقدم بناءً على سعر البرجر الحالي
        const targetPoints = REWARDS_CONFIG.burger.cost; 
        const progressPercentage = Math.min(Math.round((points / targetPoints) * 100), 100);
        
        setTimeout(() => {
            document.getElementById('progress-bar').style.width = `${progressPercentage}%`;
            document.getElementById('progress-percent').innerText = `${progressPercentage}%`;
        }, 300);

        // العبارة التفاعلية أسفل الشريط
        const statusTextElement = document.getElementById('status-text');
        if (points >= targetPoints) {
            statusTextElement.innerText = "🎉 لديك نقاط كافية لطلب برجر مجاني الآن!";
        } else {
            const remaining = targetPoints - points;
            statusTextElement.innerText = `باقي ${remaining} نقطة للحصول على برجر مجاني!`;
        }

        // توليد شبكة الأكلات ديناميكياً
        const gridContainer = document.getElementById('rewards-grid-container');
        gridContainer.innerHTML = ""; 
        Object.values(REWARDS_CONFIG).forEach(item => {
            gridContainer.innerHTML += `
                <div class="reward-item">
                    <img src="${item.img}" alt="${item.name}" class="reward-img">
                    <div class="reward-name">${item.name}</div>
                    <div class="reward-cost">${item.cost} Point</div>
                </div>
            `;
        });

        // توليد كود الـ QR المتموضع بالخلفية
        new QRCode(document.getElementById("qrcode"), {
            text: userId, width: 110, height: 110, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.M
        });
    </script>
</body>
</html>
