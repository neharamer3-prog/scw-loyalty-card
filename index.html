<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظة الأوفياء الرقمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary-gold: #e5a93b; --dark-gold: #b88219; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .loyalty-card { width: 100%; max-width: 360px; height: 210px; background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%); border-radius: 20px; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; color: white; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); border: 1px solid rgba(229, 169, 59, 0.2); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .logo-area { font-size: 18px; font-weight: 800; color: var(--primary-gold); }
        .card-badge { font-size: 11px; background: linear-gradient(135deg, var(--primary-gold) 0%, var(--dark-gold) 100%); padding: 5px 12px; border-radius: 50px; font-weight: bold; }
        .points-display { margin: 15px 0; }
        .points-label { font-size: 11px; color: #adb5bd; }
        .points-count { font-size: 42px; font-weight: 800; color: var(--primary-gold); }
        .member-name { font-size: 15px; font-weight: 600; color: #f8f9fa; }
        .scan-button-container { width: 100%; max-width: 360px; margin-top: 40px; }
        .btn-scan { width: 100%; background: linear-gradient(135deg, var(--primary-gold) 0%, var(--dark-gold) 100%); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(229, 169, 59, 0.3); }
        .info-text { font-size: 12px; color: #6c757d; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="loyalty-card">
        <div class="card-header">
            <div class="logo-area">🍕 SCW PIZZERIA</div>
            <div class="card-badge">عضوية VIP</div>
        </div>
        <div class="points-display">
            <div class="points-label">رصيد النقاط الحالي</div>
            <div class="points-count" id="points-val">...</div>
        </div>
        <div class="member-name" id="user-fullname">جاري التحميل..</div>
    </div>
    <div class="scan-button-container">
        <button class="btn-scan" onclick="startQRScanner()">إرسال كود التحقق (Scan QR)</button>
    </div>
    <div class="info-text">قم بمسح كود الـ QR المعروض عند الكاشير لتعبئة رصيد محفظتك فوراً.</div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();
        const telegramUser = tg.initDataUnsafe.user;
        if (telegramUser) {
            document.getElementById('user-fullname').innerText = telegramUser.first_name + " " + (telegramUser.last_name || "");
        }
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('points-val').innerText = urlParams.get('points') || '0';
        function startQRScanner() {
            tg.showScanQrPopup({ text: "قم بمسح كود الـ QR الخاص بالفاتورة لشحن نقاطك فوراً ⚡" }, function(scannedText) {
                tg.sendData(scannedText); tg.closeScanQrPopup(); tg.close(); return true;
            });
        }
    </script>
</body>
</html>
