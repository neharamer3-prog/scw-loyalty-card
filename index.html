<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة الأوفياء الرقمية - CAMPUS YUMMY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-gold: #e5a93b;
            --dark-gold: #b88219;
            --bg-color: #121212;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e1e1e 0%, var(--bg-color) 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* تأثير الإضاءة الخلفية الفاخرة */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(229, 169, 59, 0.08) 0%, transparent 70%);
            top: 10%;
            left: -50px;
            z-index: 0;
            pointer-events: none;
        }

        /* حاوية البطاقة ثلاثية الأبعاد */
        .card-container {
            width: 100%;
            max-width: 360px;
            height: 215px;
            perspective: 1200px;
            margin-top: 30px;
            cursor: pointer;
            z-index: 1;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 24px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 1px rgba(229, 169, 59, 0.3);
            border: 1px solid rgba(229, 169, 59, 0.25);
        }

        /* واجهة الكرت الفاخرة */
        .card-front {
            background: linear-gradient(135deg, #2c2c2c 0%, #151515 100%);
        }

        /* ظهر الكرت */
        .card-back {
            background: linear-gradient(135deg, #151515 0%, #2c2c2c 100%);
            transform: rotateY(180deg);
            justify-content: center;
            align-items: center;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-area {
            font-size: 19px;
            font-weight: 800;
            color: var(--primary-gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .card-badge {
            font-size: 10px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--dark-gold) 100%);
            padding: 5px 14px;
            border-radius: 50px;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(229, 169, 59, 0.2);
        }

        .points-display {
            margin: 15px 0;
            width: 100%;
        }

        .points-label {
            font-size: 11px;
            color: #999;
            letter-spacing: 0.5px;
        }

        .points-count {
            font-size: 44px;
            font-weight: 800;
            background: linear-gradient(to right, #fff 30%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .member-name {
            font-size: 16px;
            font-weight: 600;
            color: #f0f0f0;
            width: 100%;
        }

        /* تصميم كود الـ QR بداخل ظهر الكرت */
        .qr-inside-card {
            background: white;
            padding: 10px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 2px solid var(--primary-gold);
        }

        /* إشعار تلميحي للمستخدم بالمذكر */
        .hint-click {
            font-size: 12px;
            color: var(--primary-gold);
            margin-top: 25px;
            z-index: 1;
            background: rgba(225, 169, 59, 0.1);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(225, 169, 59, 0.2);
        }

        .info-text {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-top: auto;
            margin-bottom: 20px;
            line-height: 1.6;
            padding: 0 25px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- الكرت الفاخر -->
    <div class="card-container" id="loyaltyCard" onclick="toggleCardFlip()">
        <div class="card-inner">
            
            <!-- الوجه الأمامي -->
            <div class="card-front">
                <div class="card-header">
                    <div class="logo-area"> YUMMY 😋</div>
                    <div class="card-badge">VIP MEMBER</div>
                </div>
                <div class="points-display">
                    <div class="points-label">رصيد النقاط الحالي</div>
                    <div class="points-count" id="points-val">0</div>
                </div>
                <div class="card-footer">
                    <div class="member-name" id="user-fullname">جاري التحميل..</div>
                </div>
            </div>

            <!-- الظهر وفيه الـ QR -->
            <div class="card-back">
                <div class="qr-inside-card">
                    <div id="qrcode"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- تلميح تفاعلي بالمذكر -->
    <div class="hint-click">🔄 اضغط على الكرت لقلبه وإظهار كود الـ QR</div>

    <div class="info-text">
        قم بإظهار كود الـ QR المتواجد خلف بطاقتك الرقمية للكاشير عند الدفع ليقوم بمسحه وشحن نقاطك على الفور ⚡
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // قراءة المعطيات من الرابط الممرر بواسطة البوت
        const urlParams = new URLSearchParams(window.location.search);
        
        // الحصول على معرف المستخدم الحقيقي
        let userId = urlParams.get('user_id') || (tg.initDataUnsafe?.user ? tg.initDataUnsafe.user.id.toString() : "unknown");
        
        // الحصول على الاسم والنقاط الحية الممررة
        let fullName = urlParams.get('name') || (tg.initDataUnsafe?.user ? (tg.initDataUnsafe.user.first_name + " " + (tg.initDataUnsafe.user.last_name || "")) : "زبون متجرنا");
        let currentPoints = urlParams.get('points') || "0";

        // تحديث الواجهة فوراً
        document.getElementById('user-fullname').innerText = fullName;
        document.getElementById('points-val').innerText = currentPoints;

        // توليد الـ QR بدقة عالية واحترافية بناءً على الـ userId الصحيح
        if(userId !== "unknown") {
            new QRCode(document.getElementById("qrcode"), {
                text: userId,
                width: 130,
                height: 130,
                colorDark : "#111111",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function toggleCardFlip() {
            const card = document.getElementById('loyaltyCard');
            card.classList.toggle('flipped');
        }
    </script>
</body>
</html>
